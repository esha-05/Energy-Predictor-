<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Energy Predictor | Smart Building Analytics</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏠</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
    }

    body { 
      font-family: 'Inter', sans-serif; 
      background-color: var(--bg); 
      color: var(--text-main);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: var(--card-bg);
      width: 100%;
      max-width: 650px;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    h2 { margin: 0; font-weight: 700; color: var(--text-main); font-size: 24px; }
    p.subtitle { color: var(--text-muted); margin-top: 8px; font-size: 14px; }

    /* Grid Layout for Inputs */
    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 24px;
      margin-bottom: 32px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 6px;
    }

    input {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      transition: all 0.2s;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    button {
      width: 100%;
      background: var(--primary);
      color: white;
      padding: 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: background 0.2s;
    }

    button:hover { background: var(--primary-hover); }

    /* Results Section */
    #result {
      margin-top: 32px;
      padding: 24px;
      background: #f1f5f9;
      border-radius: 12px;
      display: none;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-cards {
      display: flex;
      gap: 16px;
      margin-top: 12px;
    }

    .res-card {
      background: white;
      flex: 1;
      padding: 16px;
      border-radius: 10px;
      text-align: center;
      border: 1px solid var(--border);
    }

    .res-label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .value {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
    }

    .unit { font-size: 14px; color: var(--text-muted); margin-left: 2px; }

    @media (max-width: 500px) {
      .input-grid { grid-template-columns: 1fr; }
      .container { padding: 24px; margin: 20px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h2>🏠 Smart Energy Predictor</h2>
      <p class="subtitle">Enter architectural parameters to estimate energy loads.</p>
    </header>

    <div class="input-grid">
      <div class="input-group">
        <label>Relative Compactness</label>
        <input id="compactness" type="number" step="0.01" value="0.98">
      </div>
      <div class="input-group">
        <label>Surface Area (m²)</label>
        <input id="surface_area" type="number" step="0.1" value="514.5">
      </div>
      <div class="input-group">
        <label>Wall Area (m²)</label>
        <input id="wall_area" type="number" step="0.1" value="294.0">
      </div>
      <div class="input-group">
        <label>Roof Area (m²)</label>
        <input id="roof_area" type="number" step="0.01" value="110.25">
      </div>
      <div class="input-group">
        <label>Overall Height (m)</label>
        <input id="height" type="number" step="0.5" value="7.0">
      </div>
      <div class="input-group">
        <label>Orientation (2-5)</label>
        <input id="orientation" type="number" value="2">
      </div>
      <div class="input-group">
        <label>Glazing Area</label>
        <input id="glazing_area" type="number" step="0.1" value="0.0">
      </div>
      <div class="input-group">
        <label>Glazing Dist. (0-5)</label>
        <input id="glazing_distribution" type="number" value="0">
      </div>
    </div>

    <button onclick="predict()">Calculate Efficiency</button>

    <div id="result">
      <div class="result-cards">
        <div class="res-card">
          <span class="res-label">Heating Load</span>
          <span class="value" id="heating">-</span><span class="unit">kWh/m²</span>
        </div>
        <div class="res-card">
          <span class="res-label">Cooling Load</span>
          <span class="value" id="cooling">-</span><span class="unit">kWh/m²</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    async function predict() {
      const btn = document.querySelector('button');
      btn.innerText = "Processing...";
      btn.style.opacity = "0.7";

      const data = {
        compactness:          parseFloat(document.getElementById('compactness').value),
        surface_area:         parseFloat(document.getElementById('surface_area').value),
        wall_area:            parseFloat(document.getElementById('wall_area').value),
        roof_area:            parseFloat(document.getElementById('roof_area').value),
        height:               parseFloat(document.getElementById('height').value),
        orientation:          parseFloat(document.getElementById('orientation').value),
        glazing_area:         parseFloat(document.getElementById('glazing_area').value),
        glazing_distribution: parseFloat(document.getElementById('glazing_distribution').value)
      }

      try {
        const response = await fetch('http://127.0.0.1:5000/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        })

        const result = await response.json()

        document.getElementById('heating').textContent = result.heating_load.toFixed(2)
        document.getElementById('cooling').textContent = result.cooling_load.toFixed(2)
        document.getElementById('result').style.display = 'block'

      } catch (error) {
        alert('Error: Make sure your Flask server is running!')
      } finally {
        btn.innerText = "Calculate Efficiency";
        btn.style.opacity = "1";
      }
    }
  </script>

</body>
</html>
